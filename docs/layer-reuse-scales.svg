<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" role="img" aria-labelledby="t2 d2">
  <title id="t2">Shared layers reused across four modpacks</title>
  <desc id="d2">Four packs are built from a small set of layers. Tech is core plus performance plus tech-mods; Adventure is core plus performance plus adventure-mods; Magic is core plus magic-mods; Skyblock is core plus skyblock-mods. The registry stores the core layer once (referenced by all four packs) and the performance layer once (referenced by two packs), plus one small unique blob per pack: ten layer references, only six stored blobs.</desc>
  <defs>
    <marker id="nS" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#51606f"/>
    </marker>
    <marker id="nP" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c8a99"/>
    </marker>
    <marker id="nB" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#1c5cab"/>
    </marker>
    <marker id="nG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#007300"/>
    </marker>
    <marker id="nV" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4a3aa7"/>
    </marker>
    <marker id="nA" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#12855d"/>
    </marker>
  </defs>

  <!-- opaque card so the figure is legible on light and dark page themes -->
  <rect x="1" y="1" width="958" height="638" rx="14" fill="#f6f7f4" stroke="#d7d6cf"/>

  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
    <!-- pixel-stair motif + title -->
    <rect x="46" y="56" width="10" height="10" fill="#51606f"/>
    <rect x="56" y="46" width="10" height="10" fill="#8194a6"/>
    <rect x="66" y="36" width="10" height="10" fill="#c2cdd7"/>
    <text x="90" y="56" font-size="21" font-weight="700" fill="#1a1a19">Shared layers scale across a fleet of packs</text>
    <text x="90" y="80" font-size="13.5" fill="#52514e">4 packs reference 10 layers &#8212; the registry stores only 6 unique blobs.</text>

    <text x="44" y="118" font-size="11" font-weight="600" letter-spacing="1.2" fill="#898781">PACKS &#183; LAYER RECIPES</text>
    <text x="556" y="118" font-size="11" font-weight="600" letter-spacing="1.2" fill="#898781">REGISTRY &#183; EACH BLOB STORED ONCE</text>

    <!-- Tech: core + performance + tech -->
    <g>
      <rect x="44" y="126" width="330" height="88" rx="8" fill="#ffffff" stroke="#e3e2db"/>
      <rect x="60" y="141" width="11" height="11" fill="#2a78d6"/>
      <text x="78" y="151" font-size="13.5" font-weight="700" fill="#1a1a19">Tech</text>
      <rect x="60" y="166" width="70" height="32" rx="3" fill="#dfe5ea" stroke="#51606f" stroke-width="1.5"/>
      <text x="95" y="186" font-size="11.5" text-anchor="middle" fill="#33404d">core</text>
      <rect x="138" y="166" width="126" height="32" rx="3" fill="#eef1f4" stroke="#7c8a99" stroke-width="1.5"/>
      <text x="201" y="186" font-size="11.5" text-anchor="middle" fill="#4b5866">performance</text>
      <rect x="272" y="166" width="86" height="32" rx="3" fill="#dcebfb" stroke="#2a78d6" stroke-width="1.5"/>
      <text x="315" y="186" font-size="11.5" text-anchor="middle" fill="#17457e">tech</text>
    </g>

    <!-- Adventure: core + performance + adventure -->
    <g>
      <rect x="44" y="228" width="330" height="88" rx="8" fill="#ffffff" stroke="#e3e2db"/>
      <rect x="60" y="243" width="11" height="11" fill="#008300"/>
      <text x="78" y="253" font-size="13.5" font-weight="700" fill="#1a1a19">Adventure</text>
      <rect x="60" y="268" width="70" height="32" rx="3" fill="#dfe5ea" stroke="#51606f" stroke-width="1.5"/>
      <text x="95" y="288" font-size="11.5" text-anchor="middle" fill="#33404d">core</text>
      <rect x="138" y="268" width="126" height="32" rx="3" fill="#eef1f4" stroke="#7c8a99" stroke-width="1.5"/>
      <text x="201" y="288" font-size="11.5" text-anchor="middle" fill="#4b5866">performance</text>
      <rect x="272" y="268" width="86" height="32" rx="3" fill="#dcefdc" stroke="#008300" stroke-width="1.5"/>
      <text x="315" y="288" font-size="11.5" text-anchor="middle" fill="#0a5c0a">adventure</text>
    </g>

    <!-- Magic: core + magic -->
    <g>
      <rect x="44" y="330" width="330" height="88" rx="8" fill="#ffffff" stroke="#e3e2db"/>
      <rect x="60" y="345" width="11" height="11" fill="#4a3aa7"/>
      <text x="78" y="355" font-size="13.5" font-weight="700" fill="#1a1a19">Magic</text>
      <rect x="60" y="370" width="70" height="32" rx="3" fill="#dfe5ea" stroke="#51606f" stroke-width="1.5"/>
      <text x="95" y="390" font-size="11.5" text-anchor="middle" fill="#33404d">core</text>
      <rect x="138" y="370" width="110" height="32" rx="3" fill="#e6e2f8" stroke="#4a3aa7" stroke-width="1.5"/>
      <text x="193" y="390" font-size="11.5" text-anchor="middle" fill="#3b2f86">magic</text>
    </g>

    <!-- Skyblock: core + skyblock -->
    <g>
      <rect x="44" y="432" width="330" height="88" rx="8" fill="#ffffff" stroke="#e3e2db"/>
      <rect x="60" y="447" width="11" height="11" fill="#12855d"/>
      <text x="78" y="457" font-size="13.5" font-weight="700" fill="#1a1a19">Skyblock</text>
      <rect x="60" y="472" width="70" height="32" rx="3" fill="#dfe5ea" stroke="#51606f" stroke-width="1.5"/>
      <text x="95" y="492" font-size="11.5" text-anchor="middle" fill="#33404d">core</text>
      <rect x="138" y="472" width="110" height="32" rx="3" fill="#d9f4ea" stroke="#12855d" stroke-width="1.5"/>
      <text x="193" y="492" font-size="11.5" text-anchor="middle" fill="#0b6647">skyblock</text>
    </g>

    <!-- registry -->
    <g>
      <rect x="556" y="126" width="360" height="442" rx="10" fill="#ffffff" stroke="#e3e2db"/>
      <text x="576" y="150" font-size="10.5" font-weight="600" letter-spacing="0.8" fill="#898781">SHARED &#8212; STORED ONCE, REFERENCED BY MANY</text>

      <rect x="584" y="162" width="304" height="54" rx="3" fill="#dfe5ea" stroke="#51606f" stroke-width="2"/>
      <rect x="590" y="168" width="6" height="6" fill="#51606f" opacity="0.55"/>
      <rect x="596" y="174" width="6" height="6" fill="#51606f" opacity="0.3"/>
      <text x="608" y="184" font-size="13" font-weight="700" fill="#33404d">core layer</text>
      <text x="608" y="202" font-size="10.5" fill="#5c6b7a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">sha256:11ab&#8230;</text>
      <rect x="800" y="172" width="72" height="21" rx="10.5" fill="#51606f"/>
      <text x="836" y="186" font-size="10.5" font-weight="600" text-anchor="middle" fill="#ffffff">&#215;4 packs</text>

      <rect x="584" y="228" width="304" height="54" rx="3" fill="#eef1f4" stroke="#7c8a99" stroke-width="2"/>
      <rect x="590" y="234" width="6" height="6" fill="#7c8a99" opacity="0.6"/>
      <rect x="596" y="240" width="6" height="6" fill="#7c8a99" opacity="0.35"/>
      <text x="608" y="250" font-size="13" font-weight="700" fill="#4b5866">performance layer</text>
      <text x="608" y="268" font-size="10.5" fill="#687583" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">sha256:77e0&#8230;</text>
      <rect x="800" y="238" width="72" height="21" rx="10.5" fill="#7c8a99"/>
      <text x="836" y="252" font-size="10.5" font-weight="600" text-anchor="middle" fill="#ffffff">&#215;2 packs</text>

      <text x="576" y="314" font-size="10.5" font-weight="600" letter-spacing="0.8" fill="#898781">UNIQUE &#8212; ONE SMALL BLOB PER PACK</text>

      <rect x="584" y="326" width="304" height="40" rx="3" fill="#dcebfb" stroke="#2a78d6" stroke-width="1.5"/>
      <text x="600" y="343" font-size="12" font-weight="600" fill="#17457e">tech-mods</text>
      <text x="600" y="357" font-size="10" fill="#4a6f9c" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">sha256:b3f1&#8230;</text>

      <rect x="584" y="376" width="304" height="40" rx="3" fill="#dcefdc" stroke="#008300" stroke-width="1.5"/>
      <text x="600" y="393" font-size="12" font-weight="600" fill="#0a5c0a">adventure-mods</text>
      <text x="600" y="407" font-size="10" fill="#3d7a3d" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">sha256:5c9d&#8230;</text>

      <rect x="584" y="426" width="304" height="40" rx="3" fill="#e6e2f8" stroke="#4a3aa7" stroke-width="1.5"/>
      <text x="600" y="443" font-size="12" font-weight="600" fill="#3b2f86">magic-mods</text>
      <text x="600" y="457" font-size="10" fill="#6a5fb0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">sha256:c7d0&#8230;</text>

      <rect x="584" y="476" width="304" height="40" rx="3" fill="#d9f4ea" stroke="#12855d" stroke-width="1.5"/>
      <text x="600" y="493" font-size="12" font-weight="600" fill="#0b6647">skyblock-mods</text>
      <text x="600" y="507" font-size="10" fill="#3d8a6e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">sha256:e21f&#8230;</text>

      <text x="736" y="546" font-size="11" font-weight="600" text-anchor="middle" fill="#898781">10 layer references &#8594; only 6 stored blobs</text>
    </g>

    <!-- connectors: core (all four packs converge on one blob) -->
    <g fill="none" stroke="#51606f" stroke-width="1.8" opacity="0.9">
      <path d="M376,172 C446,172 486,186 535,188"/>
      <path d="M376,274 C446,274 486,196 536,190"/>
      <path d="M376,378 C446,378 490,206 537,192"/>
      <path d="M376,480 C450,480 492,214 538,194"/>
    </g>
    <path d="M550,189 L570,189" fill="none" stroke="#51606f" stroke-width="2" marker-end="url(#nS)"/>
    <circle cx="544" cy="189" r="5" fill="#51606f"/>

    <!-- connectors: performance (two packs converge on one blob) -->
    <g fill="none" stroke="#7c8a99" stroke-width="1.8" opacity="0.9">
      <path d="M376,182 C446,182 486,248 536,253"/>
      <path d="M376,284 C446,284 486,262 536,257"/>
    </g>
    <path d="M550,255 L570,255" fill="none" stroke="#7c8a99" stroke-width="2" marker-end="url(#nP)"/>
    <circle cx="544" cy="255" r="5" fill="#7c8a99"/>

    <!-- connectors: unique layers -->
    <g fill="none" stroke-width="1.6" opacity="0.85">
      <path d="M376,192 C470,192 500,346 570,346" stroke="#1c5cab" marker-end="url(#nB)"/>
      <path d="M376,294 C470,294 500,396 570,396" stroke="#007300" marker-end="url(#nG)"/>
      <path d="M376,394 C470,394 500,446 570,446" stroke="#4a3aa7" marker-end="url(#nV)"/>
      <path d="M376,496 C470,496 500,496 570,496" stroke="#12855d" marker-end="url(#nA)"/>
    </g>

    <!-- takeaway -->
    <rect x="44" y="592" width="10" height="10" fill="#51606f"/>
    <text x="62" y="602" font-size="13" fill="#52514e">A 5th pack that reuses core + performance uploads <tspan font-weight="700" fill="#33404d">only its own small layer</tspan> &#8212; the shared blobs are already in the registry.</text>
  </g>
</svg>
