# Optional: for running the build/publish/verify steps on your own machine.
# You do NOT need this to use the template - GitHub Actions does everything
# for you. Install mise (https://mise.jdx.dev), then `mise install`.
[tools]
oras = "1.2.2"
jq   = "1.7.1"

[env]
# Local runs only. CI sets these automatically from your repo name.
# Replace OWNER with your GitHub username (all lowercase).
REGISTRY = "ghcr.io/owner/oci-modpack-template"
TAG = "latest"

[tasks.build]
description = "Build modpack layers locally (no upload)"
run = "PUSH=false ./scripts/build-and-push.sh"

[tasks.publish]
description = "Build and push all packs to $REGISTRY (run `oras login ghcr.io` first)"
run = "./scripts/build-and-push.sh"

[tasks.verify]
description = "Pull packs back, show layer reuse, and extract them locally"
run = "./scripts/verify.sh"
