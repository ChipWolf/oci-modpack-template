# Real end-to-end test: run a server that installs your published packs.
#
# Requires an itzg/minecraft-server image version that supports OCI generic
# packs (the `oci://` scheme on GENERIC_PACKS). Replace the pack addresses
# below with your own (the publish workflow prints them).
#
#   docker compose up
#
# If your packs are private, run `docker login ghcr.io` on this host first,
# or mount an auth file and set GENERIC_PACKS_OCI_AUTH_FILE.
services:
  mc:
    image: itzg/minecraft-server
    ports:
      - "25565:25565"
    environment:
      EULA: "true"
      # Match these to your mods' loader and Minecraft version:
      TYPE: "FABRIC"
      VERSION: "1.21.1"
      # Your published packs, comma-separated, applied in order:
      GENERIC_PACKS: "oci://ghcr.io/you/my-modpacks/tech:latest,oci://ghcr.io/you/my-modpacks/magic:latest"
    volumes:
      - mc-data:/data
volumes:
  mc-data: {}
